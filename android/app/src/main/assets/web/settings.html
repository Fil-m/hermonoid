<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hermonoid</title>
<style>
  :root { --bg: #1a1a2e; --surface: #16213e; --surface2: #0f3460; --accent: #e94560; --text: #eee; --text2: #aaa; --border: #2a2a4a; --success: #2ecc71; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
  .header h1 { font-size: 18px; flex: 1; }
  .header a { background: var(--surface2); padding: 8px 16px; border-radius: 8px; color: var(--text); text-decoration: none; font-size: 14px; }
  .header a:hover { background: var(--accent); }
  .container { max-width: 600px; margin: 0 auto; padding: 16px; }
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
  .section-title { padding: 14px 18px; font-size: 15px; font-weight: 600; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .section-body { padding: 16px 18px; }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 4px; }
  .field input, .field select { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }
  .field .hint { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 500; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary { background: var(--surface2); color: var(--text); }
  .badge-ok { display:inline-block; padding:3px 10px; border-radius:12px; font-size:12px; background:rgba(46,204,113,0.2); color:var(--success); }
  .badge-off { display:inline-block; padding:3px 10px; border-radius:12px; font-size:12px; background:rgba(233,69,96,0.2); color:var(--accent); }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--success); color:white; padding:10px 24px; border-radius:8px; font-size:14px; z-index:100; opacity:0; transition:opacity 0.3s; pointer-events:none; }
  .toast.show { opacity:1; } .toast.error { background:var(--accent); }
</style>
</head>
<body>
<div class="header"><h1>⚙️ Налаштування</h1><a href="/">← Назад</a></div>
<div class="container">
  <div class="section">
    <div class="section-title">🔑 API Ключ (gonka)</div>
    <div class="section-body">
      <div class="field">
        <label>API ключ</label>
        <div style="display:flex;gap:8px;">
          <input type="password" id="apiKey" placeholder="sk-..." style="flex:1;">
          <button class="btn btn-secondary" onclick="toggleKey()">👁</button>
        </div>
        <div class="hint" id="keyStatus"></div>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button class="btn btn-primary" onclick="saveKey()">💾 Зберегти</button>
        <button class="btn btn-secondary" onclick="testKey()">🔍 Перевірити</button>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">🌐 API URL</div>
    <div class="section-body">
      <div class="field">
        <label>Base URL</label>
        <input type="text" id="baseUrl" placeholder="https://proxy.gonka.gg/v1">
        <div class="hint">OpenAI-сумісний API ендпоінт (gonka, openrouter тощо)</div>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">🤖 Модель</div>
    <div class="section-body">
      <div class="field">
        <label>Модель</label>
        <select id="modelSelect"></select>
      </div>
    </div>
  </div>
  <div class="section">
    <div class="section-title">ℹ️ Про додаток</div>
    <div class="section-body">
      <div style="font-size:13px;color:var(--text2);line-height:1.6;">
        <strong>Hermonoid v3 — Self-Contained</strong><br>
        Python + веб-інтерфейс всередині APK.<br>
        Працює з gonka, OpenRouter, будь-яким OpenAI API.<br>
        Сесії та історія зберігаються локально.
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const API = window.location.origin;

async function loadConfig() {
  try {
    const r = await fetch(API + '/api/config');
    const d = await r.json();
    document.getElementById('keyStatus').innerHTML = d.api_key
      ? '<span class="badge-ok">🔒 Ключ збережено</span>'
      : '<span class="badge-off">⚠️ Ключ не налаштовано</span>';
    document.getElementById('baseUrl').value = d.base_url || 'https://proxy.gonka.gg/v1';
    const sel = document.getElementById('modelSelect');
    sel.innerHTML = '';
    for (const m of (d.models || [])) {
      const o = document.createElement('option');
      o.value = m.id;
      o.textContent = m.name + (m.free ? ' 🆓' : '');
      if (m.id === d.model) o.selected = true;
      sel.appendChild(o);
    }
  } catch(e) { console.error(e); }
}

async function saveKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) { showToast('Введи ключ', true); return; }
  try {
    const r = await fetch(API + '/api/settings', { method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({api_key: key}) });
    const d = await r.json();
    if (d.ok) { showToast('✅ Ключ збережено!'); document.getElementById('apiKey').value=''; loadConfig(); }
  } catch(e) { showToast('❌ '+e.message, true); }
}

async function testKey() {
  showToast('🔄 Перевіряю...');
  try {
    const r = await fetch(API + '/api/chat', { method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message:'Скажи "Привіт" одним словом'}) });
    const d = await r.json();
    if (d.response && !d.response.startsWith('❌'))
      showToast('✅ Працює! Відповідь: '+d.response.substring(0,60));
    else showToast('❌ '+d.response, true);
  } catch(e) { showToast('❌ '+e.message, true); }
}

async function saveModel() {
  const model = document.getElementById('modelSelect').value;
  const baseUrl = document.getElementById('baseUrl').value.trim();
  try {
    await fetch(API + '/api/settings', { method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model, base_url: baseUrl}) });
    showToast('✅ Збережено');
  } catch(e) { showToast('❌ '+e.message, true); }
}

function toggleKey() {
  const i = document.getElementById('apiKey');
  i.type = i.type === 'password' ? 'text' : 'password';
}

let tt;
function showToast(msg, err) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show' + (err?' error':'');
  clearTimeout(tt); tt = setTimeout(() => el.classList.remove('show'), 3000);
}

document.getElementById('modelSelect').addEventListener('change', saveModel);
document.getElementById('baseUrl').addEventListener('change', saveModel);
loadConfig();
</script>
</body>
</html>
